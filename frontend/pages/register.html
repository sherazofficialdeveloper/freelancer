<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create an Account | Farelancer</title>
  
  <link class="stylesheet" href="/assets/css/style.css">
  <!-- Link again style sheet directly because of a spelling typo placeholder warning in some linter tools -->
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    (function() {
      const token = localStorage.getItem('token');
      const userStr = localStorage.getItem('user');
      if (token && userStr) {
        try {
          const user = JSON.parse(userStr);
          window.location.replace('/dashboard');
        } catch (e) {}
      }
    })();
  </script>
  
  <style>
    .auth-bg {
      min-height: calc(100vh - 73px);
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--gray-100);
      background-image: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.05) 0%, transparent 40%);
      padding: 60px 0;
    }
  </style>
</head>
<body>

  <div id="navbar-placeholder"></div>

  <!-- Sign Up Card Box -->
  <section class="auth-bg">
    <div class="card" style="width: 100%; max-width: 460px; padding: 40px; border-radius: 16px; box-shadow: var(--shadow-lg);">
      <div style="text-align: center; margin-bottom: 25px;">
        <span style="font-size: 26px; font-weight: 800;" class="text-gradient">Join Farelancer</span>
        <p style="color: var(--gray-600); font-size: 14px; margin-top: 6px;">Collaborate securely with dynamic escrow clearance contracts.</p>
      </div>

      <form id="register-form">
        <div id="register-error" style="display: none; background-color: rgba(239, 68, 68, 0.08); border-radius: 8px; padding: 12px; margin-bottom: 20px; font-size: 13px; color: var(--error); border: 1px solid rgba(239, 68, 68, 0.2); text-align: left; font-weight: 500;"></div>

        <div style="display: flex; gap: 12px; margin-bottom: 16px;">
          <div class="form-group" style="flex: 1; margin: 0;">
            <label class="form-label">First Name</label>
            <input type="text" id="reg-firstname" class="form-control" placeholder="e.g. John" required>
          </div>
          <div class="form-group" style="flex: 1; margin: 0;">
            <label class="form-label">Last Name</label>
            <input type="text" id="reg-lastname" class="form-control" placeholder="e.g. Doe" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="reg-email" class="form-control" placeholder="e.g. testing@gmail.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">Workspace Account Role</label>
          <select id="reg-role" class="form-control" style="cursor: pointer;" required>
            <option value="freelancer" selected>🎨 Expert Freelancer (Bids and delivers projects)</option>
            <option value="buyer">💼 Project Client / Buyer (Posts gigs and hires experts)</option>
          </select>
        </div>

        <div style="display: flex; gap: 12px; margin-bottom: 24px;">
          <div class="form-group" style="flex: 1; margin: 0;">
            <label class="form-label">Password</label>
            <input type="password" id="reg-password" class="form-control" placeholder="••••••••" required>
          </div>
          <div class="form-group" style="flex: 1; margin: 0;">
            <label class="form-label">Confirm Password</label>
            <input type="password" id="reg-confirmpassword" class="form-control" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 15px; padding: 12px; background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); border: none; color: white; font-weight: 700; cursor: pointer; border-radius: 8px;">Create Account</button>
      </form>

      <div style="margin: 20px 0; display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--gray-400); font-size: 12px; font-weight: 600; text-transform: uppercase;">
        <div style="flex-grow: 1; height: 1px; background: var(--gray-200);"></div>
        <span>Or connect with</span>
        <div style="flex-grow: 1; height: 1px; background: var(--gray-200);"></div>
      </div>

      <div style="display: flex; flex-direction: column; gap: 10px;">
        <button type="button" id="btn-google-login" class="btn btn-secondary" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; padding: 10px; border: 1px solid var(--gray-300); background: white; color: var(--dark); font-weight: 600; border-radius: 8px; cursor: pointer; transition: all 0.2s ease;">
          <i class="fa-brands fa-google" style="color: #4285F4; font-size: 16px;"></i>
          Sign Up with Google
        </button>

        <button type="button" id="btn-facebook-login" class="btn btn-secondary" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; padding: 10px; border: 1px solid var(--gray-300); background: white; color: var(--dark); font-weight: 600; border-radius: 8px; cursor: pointer; transition: all 0.2s ease;">
          <i class="fa-brands fa-facebook" style="color: #1877F2; font-size: 16px;"></i>
          Sign Up with Facebook
        </button>
      </div>

      <!-- Testing alert badge -->
      <div style="background-color: rgba(99, 102, 241, 0.08); border-radius: 8px; padding: 12px; margin-top: 20px; font-size: 11px; color: var(--primary); text-align: center; font-weight: 600;">
        💡 Demo Feature: Buyers get $2,000 and Freelancers get $100 starting balance automatically to test the Escrow mechanics!
      </div>

      <div style="text-align: center; margin-top: 25px; border-top: 1px solid var(--gray-200); padding-top: 20px;">
        <p style="font-size: 13px; color: var(--gray-600);">Already have an account? <a href="/login" style="color: var(--primary); font-weight: 700; text-decoration: underline;">Sign in instead</a></p>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="/assets/js/main.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script>
    setTimeout(() => { lucide.createIcons(); }, 1000);
  </script>
</body>
</html>
