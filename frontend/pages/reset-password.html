<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset your password - Skillnest</title>
  
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    .auth-bg {
      min-height: calc(100vh - 73px);
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--gray-100);
      background-image: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.05) 0%, transparent 40%);
      padding: 40px 16px;
    }
    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 3px solid #ffffff;
      width: 18px;
      height: 18px;
      animation: spin 1s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .validation-badge {
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 5px;
      font-weight: 500;
    }
    .badge-valid {
      color: #059669;
    }
    .badge-invalid {
      color: #dc2626;
    }
  </style>
</head>
<body>

  <div id="navbar-placeholder"></div>

  <!-- Reset Password form Box -->
  <section class="auth-bg">
    <div class="card" style="width: 100%; max-width: 440px; padding: 40px; border-radius: 16px; box-shadow: var(--shadow-lg);">
      <div style="text-align: center; margin-bottom: 24px;">
        <span style="font-size: 26px; font-weight: 800;" class="text-gradient">Reset Password</span>
        <p style="color: var(--gray-600); font-size: 14px; margin-top: 8px;">Type your brand new secure workspace password below.</p>
      </div>

      <form id="reset-form">
        <div id="error-message" style="display: none; background-color: rgba(239, 68, 68, 0.08); border-radius: 8px; padding: 12px; margin-bottom: 20px; font-size: 13px; color: var(--error); border: 1px solid rgba(239, 68, 68, 0.2); text-align: left; font-weight: 500;"></div>
        <div id="success-message" style="display: none; background-color: rgba(16, 185, 129, 0.08); border-radius: 8px; padding: 12px; margin-bottom: 20px; font-size: 13px; color: #059669; border: 1px solid rgba(16, 185, 129, 0.2); text-align: left; font-weight: 500;"></div>

        <div class="form-group" style="margin-bottom: 18px;">
          <label class="form-label" style="font-weight: 600;">New Password</label>
          <input type="password" id="new-password" class="form-control" placeholder="••••••••" required minlength="8"
                 style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--gray-300);">
          <div id="length-validation" class="validation-badge badge-invalid">
            <i class="fa-solid fa-circle-xmark"></i> Minimum 8 characters
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 28px;">
          <label class="form-label" style="font-weight: 600;">Confirm New Password</label>
          <input type="password" id="confirm-password" class="form-control" placeholder="••••••••" required
                 style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--gray-300);">
          <div id="match-validation" class="validation-badge badge-invalid">
            <i class="fa-solid fa-circle-xmark"></i> Passwords must match
          </div>
        </div>

        <button type="submit" id="btn-submit" class="btn btn-primary" style="width: 100%; font-size: 15px; padding: 12px; background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); border: none; color: white; font-weight: 700; cursor: pointer; border-radius: 8px; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center;">
          <span id="spinner-element" class="spinner" style="display: none;"></span>
          <span id="button-text">Save New Password</span>
        </button>
      </form>

      <div style="text-align: center; margin-top: 25px; border-top: 1px solid var(--gray-200); padding-top: 20px;">
        <p style="font-size: 13px; color: var(--gray-600); margin: 0;">Remember it? <a href="/login" style="color: var(--primary); font-weight: 700; text-decoration: none;">Back to Login</a></p>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="/assets/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Parse parameters from query arguments or Context Cache
      const urlParams = new URLSearchParams(window.location.search);
      const emailQuery = urlParams.get('email');
      const otpQuery = urlParams.get('otp') || urlParams.get('code');

      const resetEmail = emailQuery || sessionStorage.getItem('reset_email');
      const resetCode = otpQuery || sessionStorage.getItem('verified_otp');

      if (!resetEmail || !resetCode) {
        window.location.href = '/forgot-password';
        return;
      }

      const resetForm = document.getElementById('reset-form');
      const newPasswordInput = document.getElementById('new-password');
      const confirmPasswordInput = document.getElementById('confirm-password');
      const errorMsg = document.getElementById('error-message');
      const successMsg = document.getElementById('success-message');
      
      const lengthValidation = document.getElementById('length-validation');
      const matchValidation = document.getElementById('match-validation');

      const btnSubmit = document.getElementById('btn-submit');
      const spinner = document.getElementById('spinner-element');
      const buttonText = document.getElementById('button-text');

      // Live keyboard validation triggers for premium SaaS user feedback
      function validateInputs() {
        const pass = newPasswordInput.value;
        const confirmPass = confirmPasswordInput.value;

        // Length rule validation
        if (pass.length >= 8) {
          lengthValidation.className = 'validation-badge badge-valid';
          lengthValidation.innerHTML = '<i class="fa-solid fa-circle-check"></i> Minimum 8 characters';
        } else {
          lengthValidation.className = 'validation-badge badge-invalid';
          lengthValidation.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> Minimum 8 characters';
        }

        // Match rule validation
        if (pass === confirmPass && pass.length > 0) {
          matchValidation.className = 'validation-badge badge-valid';
          matchValidation.innerHTML = '<i class="fa-solid fa-circle-check"></i> Passwords match perfectly!';
        } else {
          matchValidation.className = 'validation-badge badge-invalid';
          matchValidation.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> Passwords must match';
        }
      }

      newPasswordInput.addEventListener('input', validateInputs);
      confirmPasswordInput.addEventListener('input', validateInputs);

      // Submit password save
      resetForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        const pass = newPasswordInput.value;
        const confirmPass = confirmPasswordInput.value;

        if (pass.length < 8) {
          errorMsg.textContent = 'Minimum password length required is 8 characters.';
          errorMsg.style.display = 'block';
          return;
        }

        if (pass !== confirmPass) {
          errorMsg.textContent = 'Oops! Your passwords do not match. Please verify and re-type.';
          errorMsg.style.display = 'block';
          return;
        }

        btnSubmit.disabled = true;
        spinner.style.display = 'inline-block';
        buttonText.textContent = 'Saving Securely...';

        try {
          const res = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
              email: resetEmail,
              resetCode: resetCode,
              newPassword: pass 
            })
          });
          const result = await res.json();

          if (result.success) {
            // Success response triggers clearing states in local/sessionStorage
            sessionStorage.removeItem('reset_email');
            sessionStorage.removeItem('verified_otp');

            successMsg.textContent = 'Success! Your password was updated successfully. Redirecting to workspace...';
            successMsg.style.display = 'block';

            setTimeout(() => {
              window.location.href = '/login?reset_success=true';
            }, 1800);
          } else {
            errorMsg.textContent = result.message || 'Saving the new password failed. The token is invalid or expired. Try recovery again.';
            errorMsg.style.display = 'block';
            btnSubmit.disabled = false;
            spinner.style.display = 'none';
            buttonText.textContent = 'Save New Password';
          }
        } catch (err) {
          errorMsg.textContent = 'Network or connection failure. Please retry.';
          errorMsg.style.display = 'block';
          btnSubmit.disabled = false;
          spinner.style.display = 'none';
          buttonText.textContent = 'Save New Password';
        }
      });
    });
  </script>
</body>
</html>
