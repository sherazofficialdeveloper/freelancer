<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Skillnest</title>
  
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    .auth-bg {
      min-height: calc(100vh - 73px);
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--gray-100);
      background-image: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.05) 0%, transparent 40%);
      padding: 40px 16px;
    }
    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 3px solid #ffffff;
      width: 18px;
      height: 18px;
      animation: spin 1s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="navbar-placeholder"></div>

  <!-- Recovery Request Form Wrap -->
  <section class="auth-bg">
    <div class="card" style="width: 100%; max-width: 440px; padding: 40px; border-radius: 16px; box-shadow: var(--shadow-lg);">
      <div style="text-align: center; margin-bottom: 24px;">
        <span style="font-size: 26px; font-weight: 800;" class="text-gradient">Password Recovery</span>
        <p style="color: var(--gray-600); font-size: 14px; margin-top: 8px;">Enter your registered account email. We will generate and send a secure 6-digit OTP to authorize resetting your password.</p>
      </div>

      <form id="forgot-form">
        <div id="error-message" style="display: none; background-color: rgba(239, 68, 68, 0.08); border-radius: 8px; padding: 12px; margin-bottom: 20px; font-size: 13px; color: var(--error); border: 1px solid rgba(239, 68, 68, 0.2); text-align: left; font-weight: 500;"></div>
        <div id="success-message" style="display: none; background-color: rgba(16, 185, 129, 0.08); border-radius: 8px; padding: 12px; margin-bottom: 20px; font-size: 13px; color: #059669; border: 1px solid rgba(16, 185, 129, 0.2); text-align: left; font-weight: 500;"></div>

        <div class="form-group" style="margin-bottom: 24px;">
          <label class="form-label" style="font-weight: 600;">Email Address</label>
          <input type="email" id="forgot-email" class="form-control" placeholder="e.g. freelancer@demo.com" required style="width:100%; padding: 12px; border-radius: 8px; border: 1px solid var(--gray-300);">
        </div>

        <button type="submit" id="btn-submit" class="btn btn-primary" style="width: 100%; font-size: 15px; padding: 12px; background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); border: none; color: white; font-weight: 700; cursor: pointer; border-radius: 8px; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center;">
          <span id="spinner-element" class="spinner" style="display: none;"></span>
          <span id="button-text">Send Security OTP</span>
        </button>
      </form>

      <div style="text-align: center; margin-top: 25px; border-top: 1px solid var(--gray-200); padding-top: 20px;">
        <p style="font-size: 13px; color: var(--gray-600); margin: 0;">Remember your password? <a href="/login" style="color: var(--primary); font-weight: 700; text-decoration: none;">Back to login</a></p>
      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script src="/assets/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Setup Lucide graphics
      setTimeout(() => { if(window.lucide) { lucide.createIcons(); } }, 300);

      const forgotForm = document.getElementById('forgot-form');
      const emailInput = document.getElementById('forgot-email');
      const errorMsg = document.getElementById('error-message');
      const successMsg = document.getElementById('success-message');
      const btnSubmit = document.getElementById('btn-submit');
      const spinner = document.getElementById('spinner-element');
      const buttonText = document.getElementById('button-text');

      forgotForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Reset dialog status lines
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';
        
        const email = emailInput.value.trim();
        if (!email) return;

        // Enter loading transitions
        btnSubmit.disabled = true;
        spinner.style.display = 'inline-block';
        buttonText.textContent = 'Generating OTP...';

        try {
          const res = await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
          });
          const result = await res.json();

          if (result.success) {
            // Save state in recovery context
            sessionStorage.setItem('reset_email', email);
            successMsg.textContent = result.message || 'OTP verification code sent! Redirecting...';
            successMsg.style.display = 'block';
            
            // Console logging aid for developer sandbox testing
            if (result.data && result.data.testPin) {
              console.log(`[DEVELOPER MODE] Generated resetting OTP: ${result.data.testPin}`);
            }

            setTimeout(() => {
              window.location.href = `/verify-otp?email=${encodeURIComponent(email)}`;
            }, 1500);
          } else {
            errorMsg.textContent = result.message || 'Unable to authorize password recovery.';
            errorMsg.style.display = 'block';
            btnSubmit.disabled = false;
            spinner.style.display = 'none';
            buttonText.textContent = 'Send Security OTP';
          }
        } catch (err) {
          console.error('[Recovery Request error]:', err);
          errorMsg.textContent = 'Network offline or server connectivity failure. Please try again.';
          errorMsg.style.display = 'block';
          btnSubmit.disabled = false;
          spinner.style.display = 'none';
          buttonText.textContent = 'Send Security OTP';
        }
      });
    });
  </script>
</body>
</html>
